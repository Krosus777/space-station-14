- type: entity
  parent: Paper
  id: PaperBlank
  name: blank form
  description: A bureaucratic form awaiting selection.
  components:
    - type: PaperForm
    - type: PaperFormPicker
      forms:
        - name: ent-PaperBlankReportStation
          template: doc-text-printer-report-station
        - name: ent-PaperBlankDepartmentReport
          template: doc-text-printer-report-department
        - name: ent-PaperBlankExperimentReport
          template: doc-text-printer-experiment-report
    - type: UserInterface
      interfaces:
        enum.PaperUiKey.Key:
          type: PaperBoundUserInterface
        enum.PaperFormPickerUiKey.Key:
          type: PaperFormPickerBoundUserInterface
