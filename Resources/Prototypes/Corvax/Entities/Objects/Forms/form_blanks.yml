- type: entity
  parent: BaseItem
  id: FormBlank
  name: blank form
  description: A bureaucratic form awaiting selection.
  components:
    - type: Sprite
      sprite: Objects/Misc/bureaucracy.rsi
      layers:
        - state: paper
        - state: paper_words
          map: ["enum.PaperVisualLayers.Writing"]
          visible: false
        - state: paper_stamp-generic
          map: ["enum.PaperVisualLayers.Stamp"]
          visible: false
    - type: Paper
    - type: FormPicker
      basePrototype: PrintedDocument
    - type: UserInterface
      interfaces:
        enum.PaperUiKey.Key:
          type: PaperBoundUserInterface
        enum.FormPickerUiKey.Key:
          type: FormPickerBoundUserInterface
        enum.FormFieldUiKey.Key:
          type: FormFieldPickerBoundUserInterface
    - type: ActivatableUI
      key: enum.PaperUiKey.Key
      requiresComplex: false
    - type: Item
      size: Tiny
